<!doctype html>
<html lang="el">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Ancient Greek Verb Lab</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="topbar">
    <div>
      <h1>Ancient Greek Verb Lab</h1>
      <p>Αναγνώριση τύπων, κλίση λημμάτων και παιχνίδι εξάσκησης.</p>
    </div>
  </header>

  <main class="page">
    <nav class="tabs card" aria-label="Κύριες λειτουργίες">
      <button class="tab-btn active" data-tab="analyzeTab">Αναγνώριση</button>
      <button class="tab-btn" data-tab="conjugationTab">Κλίση</button>
      <button class="tab-btn" data-tab="gameTab">Παιχνίδι</button>
    </nav>

    <section id="analyzeTab" class="tab-panel active">
      <section class="card">
        <h2 class="panel-title">Αναγνώριση</h2>
        <p class="panel-intro">Πληκτρολόγησε έναν ρηματικό τύπο. Η αναζήτηση γίνεται χωρίς διάκριση τόνων, πνευμάτων και τελικού σίγμα.</p>
        <div class="controls-row">
          <input id="analyzeInput" type="search" placeholder="π.χ. ἔλαβον, λύοιεν, λελυμένος" />
          <button id="analyzeBtn" type="button">Αναγνώριση</button>
        </div>
        <div id="analyzeStatus" class="minor-note"></div>
      </section>
      <section id="analyzeResults" class="card"></section>
    </section>

    <section id="conjugationTab" class="tab-panel">
      <section class="controls card">
        <label for="lemmaSelect">Λήμμα</label>
        <div class="controls-row">
          <select id="lemmaSelect"></select>
          <input id="lemmaSearch" type="search" placeholder="Αναζήτηση λήμματος…" />
        </div>
        <div id="lemmaMeta" class="lemma-meta"></div>
      </section>

      <section id="finiteSection"></section>
      <section id="nonFiniteSection"></section>
    </section>

    <section id="gameTab" class="tab-panel">
      <section class="card">
        <div class="game-header">
          <div>
            <h2 class="panel-title">Παιχνίδι</h2>
            <p class="panel-intro">Επίλεξε τη σωστή αναγνώριση για τον δοσμένο τύπο.</p>
          </div>
          <div class="game-actions">
            <button id="newQuestionBtn" type="button">Νέα ερώτηση</button>
          </div>
        </div>
        <div id="gameCard"></div>
      </section>
    </section>
  </main>

  <script src="data/bootstrap.bundle.js"></script>
  <script src="data/zzzz_finalConsolidatedPatch_v5.js"></script>
  <script src="data/agvl_runtime_patch_dual.js"></script>
  <script src="data/agvl_runtime_patch_participles.js"></script>
  <script src="data/agvl_runtime_patch_irregular_cleanup.js"></script>
  <script src="data/agvl_runtime_patch_irregular_cleanup_2.js"></script>
  <script src="data/agvl_runtime_patch_irregular_cleanup_3.js"></script>
  <script src="data/agvl_runtime_patch_irregular_cleanup_4.js"></script>
  <script src="data/agvl_runtime_patch_irregular_cleanup_5.js"></script>
  <script src="data/agvl_runtime_patch_irregular_cleanup_6.js"></script>
  <script src="data/agvl_runtime_patch_irregular_cleanup_7.js"></script>
  <script src="data/agvl_runtime_patch_irregular_cleanup_8.js"></script>
  <script src="data/agvl_runtime_patch_nonfinite_consistency_9.js"></script>
  <script src="data/agvl_runtime_patch_nonfinite_consistency_10.js"></script>
  <script src="data/agvl_runtime_patch_nonfinite_consistency_11.js"></script>
  <script src="data/agvl_runtime_patch_consistency_12.js"></script>
  <script src="data/lexiconAugmentKaikkiStage1.js"></script>
  <script src="data/generatedParadigmsKaikkiStage3.js"></script>
  <script src="data/lexiconAugmentKaikkiStage4Audit.js"></script>
  <script src="data/manualParadigmsKaikkiStage4Audit.js"></script>
  <script src="data/formIndexPatchKaikkiStage4Audit.js"></script>
  <script src="viewer.js"></script>
</body>
</html>
